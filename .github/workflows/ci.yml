name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PKG_CONFIG_PATH: /home/runner/.local/lib/pkgconfig
  LD_LIBRARY_PATH: /home/runner/.local/lib

jobs:
  build-test:
    name: Build & test against libtypio + flux-ui
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libvulkan-dev glslang-tools \
            libfreetype6-dev libharfbuzz-dev libfontconfig1-dev

      - name: Checkout libtypio
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/libtypio
          path: _libtypio

      - name: Build & install libtypio
        run: |
          meson setup _libtypio/build _libtypio \
            --prefix="$HOME/.local" -Dbuild_tests=false
          ninja -C _libtypio/build install

      - name: Checkout flux
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/flux
          path: _flux

      - name: Build & install flux
        run: |
          meson setup _flux/build _flux \
            --prefix="$HOME/.local" -Dtests=false -Dexamples=false
          ninja -C _flux/build install

      - name: Checkout flux-ui
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/flux-ui
          path: _flux-ui

      - name: Build & install flux-ui
        run: |
          meson setup _flux-ui/build _flux-ui \
            --prefix="$HOME/.local" -Dtests=false -Dexamples=false
          ninja -C _flux-ui/build install

      - name: Configure
        run: meson setup build --prefix="$HOME/.local"

      - name: Build
        run: ninja -C build

      - name: Test
        run: meson test -C build --print-errorlogs
